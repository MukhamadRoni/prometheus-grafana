# ==============================================
# Grafana Dashboard Auto-Provisioning
# ==============================================

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: "Monitoring"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
